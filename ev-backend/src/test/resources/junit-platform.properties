## JUnit 5 — Test Execution Order Configuration

# 1) Sınıf (class) sıralama: @DisplayName değerine göre alfabetik sırala
#    "Test Senaryosu 1..." → "Test Senaryosu 2..." → ... şeklinde sıralanır
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer$DisplayName

# 2) Metodlar: her sınıf içinde @DisplayName değerine göre sırala
junit.jupiter.testmethod.order.default=org.junit.jupiter.api.MethodOrderer$DisplayName

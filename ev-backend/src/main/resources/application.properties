spring.application.name=ev

# Veritabani - ortam degiskeninden al, yoksa local'i kullan
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres?currentSchema=ev}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:111}

# Schema
spring.jpa.properties.hibernate.default_schema=ev

# Hibernate / JPA Ayarlari
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Production log seviyeleri
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# Server port (Railway PORT ortam degiskenini kullanir)
server.port=${PORT:8080}